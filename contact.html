<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Nima - Electronics Engineering</title>
    <style>
        /* CSS قبلی رو اینجا کپی کن (از contact.html قبلی) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #0a0a0a;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --card-bg: rgba(255, 255, 255, 0.03);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(99,102,241,0.02) 0px, rgba(99,102,241,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(25px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 90%;
            max-width: 800px;
            z-index: 1000;
        }
        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .menu-items {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .menu-items a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: 0.3s;
        }
        .menu-items a:hover { color: var(--accent); }
        .lang-btn {
            background: rgba(99,102,241,0.3);
            border: 1px solid var(--accent);
            border-radius: 30px;
            padding: 5px 15px;
            cursor: pointer;
            color: white;
        }
        .hamburger {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
        }
        .contact-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .page-header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            transition: all 0.3s ease;
        }
        .glass-card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
        }
        .submit-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid var(--glass-border);
        }
        .copy-btn {
            background: rgba(99,102,241,0.2);
            border: 1px solid var(--accent);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .contact-grid { grid-template-columns: 1fr; }
            .hamburger { display: block; }
            .menu-items {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background: rgba(10,10,10,0.95);
                flex-direction: column;
                align-items: center;
                padding: 30px 0;
                border-radius: 20px;
            }
            .menu-items.active { display: flex; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">NIMA.DEV</div>
        <div class="menu-items" id="menu">
            <a href="index.html" data-i18n="nav.home">Home</a>
            <a href="about.html" data-i18n="nav.about">About</a>
            <a href="projects.html" data-i18n="nav.projects">Projects</a>
            <a href="contact.html" data-i18n="nav.contact">Contact</a>
            <button class="lang-btn" onclick="toggleLanguage()">🌐 EN/FA</button>
        </div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </nav>

    <div class="contact-wrapper">
        <div class="page-header">
            <h1 data-i18n="contact.title">📧 Contact Me</h1>
            <p data-i18n="contact.subtitle">Open for collaborations, projects, or just a technical chat</p>
        </div>
        <div class="contact-grid">
            <div class="glass-card">
                <h2 data-i18n="contact.formTitle">✉️ Send a Message</h2>
                <form id="contactForm" action="mailto:s.nima.mousavi.d@gmail.com" method="POST" enctype="text/plain">
                    <div class="form-group">
                        <label data-i18n="contact.name">Full Name</label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="contact.email">Email Address</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="contact.subject">Subject</label>
                        <select name="subject">
                            <option data-i18n="contact.option1">Project Collaboration</option>
                            <option data-i18n="contact.option2">Electronics Consultation</option>
                            <option data-i18n="contact.option3">Job Opportunity</option>
                            <option data-i18n="contact.option4">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="contact.message">Your Message</label>
                        <textarea name="message" required rows="4"></textarea>
                    </div>
                    <button type="submit" class="submit-btn" data-i18n="contact.sendBtn">📤 Send Message</button>
                </form>
            </div>
            <div>
                <div class="glass-card">
                    <h2 data-i18n="contact.detailsTitle">📬 Contact Details</h2>
                    <div class="info-item">
                        <div>📧</div>
                        <div style="flex:1">s.nima.mousavi.d@gmail.com</div>
                        <button class="copy-btn" onclick="copyEmail()" data-i18n="contact.copy">Copy</button>
                    </div>
                    <div class="info-item">
                        <div>💻</div>
                        <div style="flex:1">github.com/nimelectronicss</div>
                        <a href="https://github.com/nimelectronicss" target="_blank" class="copy-btn" style="text-decoration:none;">🔗</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('menu').classList.toggle('active');
        }
        function copyEmail() {
            navigator.clipboard.writeText("s.nima.mousavi.d@gmail.com");
            alert("Email copied!");
        }
        function toggleLanguage() {
            if (typeof currentLang !== 'undefined' && typeof setLanguage !== 'undefined') {
                const newLang = currentLang === 'en' ? 'fa' : 'en';
                setLanguage(newLang);
            }
        }
        document.querySelectorAll('.menu-items a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('menu').classList.remove('active');
            });
        });
    </script>
</body>
</html>
