<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nima | Home</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #6366f1; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* منوی شیک و شیشه‌ای */
        /* این کد رو جایگزین استایل قبلی nav کن */
nav { 
    position: fixed; 
    top: 20px; 
    left: 50%; 
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.08); 
    backdrop-filter: blur(20px); 
    padding: 12px 25px; /* کمی جمع‌تر برای موبایل */
    border-radius: 50px; 
    border: 1px solid rgba(255, 255, 255, 0.15);
    display: flex; 
    gap: 20px; 
    z-index: 1000;
}

nav a { 
    color: white; 
    text-decoration: none; 
    font-size: 0.9rem; /* مناسب برای موبایل */
    font-weight: 500;
    transition: 0.3s; 
}

/* استایل برای دسکتاپ (صفحه‌های بزرگتر) */
@media (min-width: 768px) {
    nav { padding: 18px 45px; gap: 40px; }
    nav a { font-size: 1.1rem; }
}

/* فاصله دادن به متن H1 برای اینکه زیر منو نره */
#hero { 
    margin-top: 80px; /* فضای خالی در بالا برای دیده شدن متن */
    height: calc(100vh - 80px);
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
}
    
        
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section id="hero">
        <h1>Hi, I'm <span class="accent" id="typed"></span></h1>
    </section>

    <script>
        const typedText = document.getElementById('typed');
        const phrases = ["Nima", "Electronics Enthusiast"];
        let i = 0, j = 0;
        function type() {
            let p = phrases[i % phrases.length];
            typedText.textContent = p.substring(0, j++);
            if(j > p.length) { j = 0; i++; }
            setTimeout(type, 200);
        }
        type();
    </script>
</body>
</html>
