<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nima | Electronics & Dev Portfolio</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #a855f7;
      --accent: #22d3ee;
      --bg-dark: #030712;
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #f3f4f6;
      --text-dim: #9ca3af;
      --glow: rgba(99, 102, 241, 0.5);
    }

    /* Reset & Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { 
      background: linear-gradient(var(--primary), var(--secondary)); 
      border-radius: 10px; 
    }

    /* Animated Mesh Background */
    .mesh-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: 
        radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15), transparent 40%);
      filter: blur(80px);
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 0;
      z-index: 1000;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .navbar.scrolled {
      padding: 12px 0;
      background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--accent), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-dim);
      font-weight: 500;
      font-size: 0.95rem;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: var(--text-main);
      text-shadow: 0 0 10px var(--primary);
    }

    .menu-toggle {
      display: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-main);
    }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 0;
      text-align: center;
    }

    .hero-content {
      max-width: 900px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 1s forwards 0.2s;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 100px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .hero h1 {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .text-gradient {
      background: linear-gradient(to right, #fff, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      color: var(--text-dim);
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .cta-group {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .btn {
      padding: 16px 32px;
      border-radius: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 1rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 35px -5px rgba(99, 102, 241, 0.6);
    }

    .btn-outline {
      border: 1px solid var(--card-border);
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.03);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--text-dim);
    }

    /* Container & Sections */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 120px 0;
      opacity: 0; /* For scroll animation */
      transform:
                        transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      font-size: 2.5rem;
      margin-bottom: 48px;
      text-align: center;
    }

    /* Skills Grid */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 32px;
      border-radius: 24px;
      backdrop-filter: blur(10px);
      transition: 0.4s ease;
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    /* Mobile */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>
  <div class="mesh-bg"></div>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <div class="logo">NIMA.DEV</div>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
      </ul>
      <div class="menu-toggle">☰</div>
    </div>
  </nav>

  <section class="hero" id="home">
    <div class="hero-content">
      <div class="badge">Electronics Student & Developer</div>
      <h1>Building the future, <br><span class="text-gradient">one circuit at a time.</span></h1>
      <p>I'm Nima, a 17-year-old passionate about electronics and software engineering.</p>
      <div class="cta-group">
        <a href="#about" class="btn btn-primary">About Me</a>
        <a href="#" class="btn btn-outline">My Projects</a>
      </div>
    </div>
  </section>

  <script>
    // Scroll Animation
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('section').forEach(sec => observer.observe(sec));

    // Navbar Scroll Effect
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      nav.classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
</body>
</html>
