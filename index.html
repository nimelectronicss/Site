<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- بسیار مهم برای موبایل -->
    <title>Nima | Portfolio</title>
    <style
    :root {
        --bg: #0a0a0a; --accent: #6366f1; 
        --glass: rgba(255, 255, 255, 0.05); 
    }

    /* اصلاح اول: برای اینکه Glow همیشه دیده شود */
    body { 
        background: var(--bg); 
        color: white; 
        font-family: 'Inter', sans-serif; 
        margin: 0; 
        overflow-x: hidden; 
        position: relative; /* مهم: برای اینکه ::before نسبت به body موقعیت بگیرد */
    }
body::before {
        content: '';
        position: fixed;
        top: -10%;
        left: -10%;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.15), transparent 70%);
        z-index: 0; /* تغییر از -1 به 0 */
        filter: blur(80px);
        pointer-events: none;
}
        
        /* منوی شیشه‌ای */
        nav { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 15px 30px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: space-between;
            width: 90%; max-width: 800px; z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }
        .menu-items { display: flex; gap: 30px; font-size: 1rem; }
        .menu-items a { color: rgba(255,255,255,0.8); text-decoration: none; transition: 0.3s; }
        .menu-items a:hover { color: var(--accent); }
        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; color: white; }

        /* بخش هیرو */
        #hero { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            padding: 0 20px;
        }
        #hero h1 { 
    font-size: clamp(2.5rem, 8vw, 4rem); 
    line-height: 1.2;
    margin: 0; 
    letter-spacing: -1px; 
        }
        
        #hero p { font-size: 1.2rem; color: rgba(255,255,255,0.6); margin-top: 10px; }
        
        .cta-btn {
            margin-top: 30px; padding: 12px 30px; border-radius: 30px;
            background: var(--accent); color: white; text-decoration: none;
            font-weight: bold; transition: 0.3s;
        }
        .cta-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }

        /* بخش پروژه‌ها */
        #projects { padding: 80px 20px; max-width: 1000px; margin: 0 auto; }
        .grid-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; margin-top: 40px; 
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
        }
        .card:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent);
            transform: translateY(-10px);
        }

        /* ریسپانسیو موبایل */
        @media (max-width: 768px) {
            nav { padding: 10px 20px; width: 95%; }
            .hamburger { display: block; }
            .menu-items { 
                display: none; position: absolute; top: 70px; left: 0; 
                width: 100%; background: rgba(10, 10, 10, 0.95); 
                flex-direction: column; align-items: center;
                padding: 40px 0; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            }
            .menu-items.active { display: flex; }
            .menu-items a { padding: 15px 0; font-size: 1.3rem; width: 100%; text-align: center; }
       #typed {
        color: var(--accent);
        display: block;
        font-size: 0.8em;
        margin-top: 10px;
       }
            }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NIMA.DEV</div>
        <div class="menu-items" id="menu">
            <a href="#hero">Home</a>
            <a href="#projects">Projects</a>
            <a href="about.html">About</a>
            <a href="#">Contact</a>
        </div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </nav>

        <section id="hero">
        <h1>
            Hi, I'm Nima<br>
            <span id="typed"></span>
        </h1>
        <p style="margin-top: 20px;">Bridging Hardware & Software</p>
        <a href="#projects" class="cta-btn">Explore My Work</a>
        </section>
    

    <section id="projects">
        <h2 style="text-align: center; font-size: 2.5rem;">My Projects</h2>
        <div class="grid-container">
            <div class="card"><h3>Project One</h3><p>Electronic Circuit Design</p></div>
            <div class="card"><h3>Project Two</h3><p>C Robotics Controller</p></div>
            <div class="card"><h3>Project Three</h3><p>Web Development</p></div>
        </div>
    </section>

    <script>
        function toggleMenu() {
            document.getElementById('menu').classList.toggle('active');
        }

        // اصلاح تایپینگ برای جلوگیری از پرش صفحه
        const typedText = document.getElementById('typed');
        const phrases = ["Electronics Enthusiast", "C Programmer"];
        let phraseIdx = 0, charIdx = 0, isDeleting = false;

        function type() {
            const currentPhrase = phrases[phraseIdx];
            if (isDeleting) {
                typedText.textContent = currentPhrase.substring(0, charIdx - 1);
                charIdx--;
            } else {
                typedText.textContent = currentPhrase.substring(0, charIdx + 1);
                charIdx++;
            }

            let typeSpeed = isDeleting ? 100 : 200;

            if (!isDeleting && charIdx === currentPhrase.length) {
                isDeleting = true;
                typeSpeed = 2000; // مکث در انتهای کلمه
            } else if (isDeleting && charIdx === 0) {
                isDeleting = false;
                phraseIdx = (phraseIdx + 1) % phrases.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }
        document.addEventListener('DOMContentLoaded', type);
    </script>
</body>
</html>
