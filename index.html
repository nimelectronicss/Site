<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nima | Home</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #6366f1; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* منوی شیک و شیشه‌ای */
        /* این کد رو جایگزین استایل قبلی nav کن */
nav { 
    position: fixed; 
    top: 25px; 
    left: 50%; 
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.08); /* کمی شفاف‌تر */
    backdrop-filter: blur(20px); /* محوی بیشتر */
    padding: 18px 45px; /* بزرگ‌تر کردن فضای داخلی منو */
    border-radius: 60px; 
    border: 1px solid rgba(255, 255, 255, 0.15);
    display: flex; 
    gap: 40px; /* فاصله بیشتر بین گزینه‌ها */
    z-index: 1000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); /* سایه ملایم برای عمق دادن */
}

nav a { 
    color: white; 
    text-decoration: none; 
    font-size: 1.1rem; /* بزرگ‌تر کردن متن لینک‌ها */
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: 0.3s ease; 
}

nav a:hover { 
    color: var(--accent); 
    transform: translateY(-2px); /* حرکت ریز موقع هاور */
    }
        
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section id="hero">
        <h1>Hi, I'm <span class="accent" id="typed"></span></h1>
    </section>

    <script>
        const typedText = document.getElementById('typed');
        const phrases = ["Nima", "Electronics Enthusiast"];
        let i = 0, j = 0;
        function type() {
            let p = phrases[i % phrases.length];
            typedText.textContent = p.substring(0, j++);
            if(j > p.length) { j = 0; i++; }
            setTimeout(type, 200);
        }
        type();
    </script>
</body>
</html>
