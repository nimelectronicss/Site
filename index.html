<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nima | Home</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #6366f1; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        
        /* استایل منو */
        nav { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 15px 30px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; align-items: center; justify-content: space-between;
            width: 90%; max-width: 600px; z-index: 1000;
        }
        .menu-items { display: flex; gap: 20px; }
        .menu-items a { color: white; text-decoration: none; }
        .hamburger { display: none; font-size: 1.5rem; cursor: pointer; }

        @media (max-width: 768px) {
            .menu-items { 
                display: none; position: absolute; top: 70px; left: 0; width: 100%;
                background: rgba(0,0,0,0.9); flex-direction: column;
                align-items: center; padding: 20px 0; border-radius: 20px;
            }
            .menu-items.active { display: flex; }
            .hamburger { display: block; }
        }

        #hero { margin-top: 150px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NIMA.DEV</div>
        <div class="menu-items" id="menu">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </nav>

    <section id="hero">
        <h1>Hi, I'm <span id="typed"></span></h1>
    </section>

    <script>
        // تابع منوی همبرگری
        function toggleMenu() {
            document.getElementById('menu').classList.toggle('active');
        }

        // تابع تایپ‌انیمیشن
        const typedText = document.getElementById('typed');
        const phrases = ["Nima", "Electronics Enthusiast"];
        let i = 0, j = 0;
        function type() {
            let p = phrases[i % phrases.length];
            typedText.textContent = p.substring(0, j++);
            if(j > p.length) { j = 0; i++; }
            setTimeout(type, 200);
        }
        type();
    </script>
</body>
</html>
